<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal de bord</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f7f7f5;
            --surface:   #ffffff;
            --border:    #e2e2de;
            --text:      #1a1a18;
            --muted:     #888880;
            --accent:    #2d6a4f;
            --accent-h:  #245a42;
            --active-bg: #eaf3ee;
            --radius:    6px;
            --mono:      'Courier New', monospace;
            --sidebar-w: 220px;
            --header-h:  52px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .user-info strong { color: var(--text); }

        .btn-logout {
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px 10px;
            font-size: 12px;
            font-family: inherit;
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-logout:hover { border-color: #c0392b; color: #c0392b; }

        /* ── Layout ── */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-title {
            padding: 16px 16px 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .canal-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 16px;
        }

        .canal-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text);
            font-size: 13px;
            transition: background 0.12s;
            user-select: none;
        }

        .canal-item:hover { background: var(--bg); }
        .canal-item.active { background: var(--active-bg); color: var(--accent); font-weight: 500; }

        .canal-icon {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .canal-item.active .canal-icon { color: var(--accent); }

        .canal-badge {
            margin-left: auto;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 10px;
            background: var(--border);
            color: var(--muted);
        }

        .sidebar-empty {
            padding: 12px 16px;
            font-size: 12px;
            color: var(--muted);
        }

        /* ── Main panel ── */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .panel-header h2 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .panel-header p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .msg-author {
            font-weight: 600;
            font-size: 13px;
        }

        .msg-author.me { color: var(--accent); }

        .msg-date {
            font-size: 11px;
            color: var(--muted);
        }

        .msg-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
        }

        .messages-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--muted);
        }

        .placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--muted);
        }

        .placeholder .icon { font-size: 28px; }
        .placeholder p { font-size: 13px; }

        /* ── Composer ── */
        .composer {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .composer textarea {
            flex: 1;
            resize: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 9px 12px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            outline: none;
            line-height: 1.4;
            max-height: 120px;
            transition: border-color 0.15s;
        }

        .composer textarea:focus { border-color: var(--accent); background: var(--surface); }
        .composer textarea::placeholder { color: var(--muted); }

        .btn-send {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-send:hover { background: var(--accent-h); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div class="logo">// journal de bord</div>
    <div class="user-info">
        <span>Connecté en tant que <strong id="username">—</strong></span>
        <button class="btn-logout" id="btn-logout">Déconnexion</button>
    </div>
</header>

<div class="workspace">

    <!-- Sidebar canaux -->
    <aside class="sidebar">
        <div class="sidebar-title">Canaux</div>
        <div class="canal-list" id="canal-list">
            <div class="sidebar-empty">Chargement…</div>
        </div>
    </aside>

    <!-- Panel messages -->
    <div class="panel" id="panel">
        <div class="placeholder">
            <div class="icon"></div>
            <p>Sélectionnez un canal pour afficher les messages.</p>
        </div>
    </div>

</div>

<script>
    const API_BASE = '/webservice_projet-1.0-SNAPSHOT';

    const token      = localStorage.getItem('token');
    const utilisateur = localStorage.getItem('utilisateur');

    if (!token || !utilisateur) {
        window.location.href = 'login.html';
    }

    document.getElementById('username').textContent = utilisateur;

    document.getElementById('btn-logout').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('utilisateur');
        window.location.href = 'login.html';
    });

    // ── Helpers ──────────────────────────────────────────

    function authHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };
    }

    function formatDate(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' })
            + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    // ── Canaux ───────────────────────────────────────────

    let currentCanal = null;

    async function loadCanaux() {
        const list = document.getElementById('canal-list');
        try {
            const res = await fetch(`${API_BASE}/channels/`, {
                headers: authHeaders()
            });

            if (res.status === 204) {
                list.innerHTML = '<div class="sidebar-empty">Aucun canal disponible.</div>';
                return;
            }

            if (!res.ok) {
                list.innerHTML = '<div class="sidebar-empty">Erreur de chargement.</div>';
                return;
            }

            const canaux = await res.json();
            list.innerHTML = '';

            canaux.forEach(canal => {
                const item = document.createElement('div');
                item.className = 'canal-item';
                item.dataset.id = canal.id;
                item.innerHTML = `
                    <span class="canal-icon">${canal.is_public ? '#' : '?'}</span>
                    <span>${canal.nom}</span>
                `;
                item.addEventListener('click', () => selectCanal(canal, item));
                list.appendChild(item);
            });

        } catch (e) {
            list.innerHTML = '<div class="sidebar-empty">Impossible de charger les canaux.</div>';
        }
    }

    function selectCanal(canal, itemEl) {
        document.querySelectorAll('.canal-item').forEach(el => el.classList.remove('active'));
        itemEl.classList.add('active');
        currentCanal = canal;
        loadMessages(canal);
    }

    // ── Messages ─────────────────────────────────────────

    async function loadMessages(canal) {
        const panel = document.getElementById('panel');

        panel.innerHTML = `
            <div class="panel-header">
                <h2>${canal.is_public ? '#' : '🔒'} ${canal.nom}</h2>
                <p>Créé par ${canal.id_createur}</p>
            </div>
            <div class="messages" id="messages"><div class="messages-empty">Chargement…</div></div>
            <div class="composer">
                <textarea id="msg-input" rows="1" placeholder="Écrire un message…"></textarea>
                <button class="btn-send" id="btn-send">Envoyer</button>
            </div>
        `;

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        try {
            const res = await fetch(`${API_BASE}/channels/${canal.id}/`, {
                headers: authHeaders()
            });

            const messagesEl = document.getElementById('messages');

            if (res.status === 204) {
                messagesEl.innerHTML = '<div class="messages-empty">Aucun message dans ce canal.</div>';
                return;
            }

            if (!res.ok) {
                messagesEl.innerHTML = '<div class="messages-empty">Erreur de chargement des messages.</div>';
                return;
            }

            const messages = await res.json();
            renderMessages(messages);

        } catch (e) {
            const messagesEl = document.getElementById('messages');
            if (messagesEl) messagesEl.innerHTML = '<div class="messages-empty">Impossible de charger les messages.</div>';
        }
    }

    function renderMessages(messages) {
        const messagesEl = document.getElementById('messages');
        if (!messagesEl) return;

        if (!messages.length) {
            messagesEl.innerHTML = '<div class="messages-empty">Aucun message dans ce canal.</div>';
            return;
        }

        messagesEl.innerHTML = '';
        messages.forEach(msg => {
            const isMe = msg.idAuteur === utilisateur;
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `
                <div class="msg-meta">
                    <span class="msg-author ${isMe ? 'me' : ''}">${msg.idAuteur}</span>
                    <span class="msg-date">${formatDate(msg.dateEnvoie)}</span>
                </div>
                <div class="msg-text">${escapeHtml(msg.text)}</div>
            `;
            messagesEl.appendChild(div);
        });

        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Envoi message ─────────────────────────────────────

    async function sendMessage() {
        if (!currentCanal) return;

        const input = document.getElementById('msg-input');
        const btn   = document.getElementById('btn-send');
        const text  = input.value.trim();

        if (!text) return;

        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE}/channels/${currentCanal.id}/`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ idAuteur: utilisateur, text })
            });

            if (res.ok) {
                input.value = '';
                // Recharger les messages
                const messagesRes = await fetch(`${API_BASE}/channels/${currentCanal.id}/`, {
                    headers: authHeaders()
                });
                if (messagesRes.ok) {
                    const messages = await messagesRes.json();
                    renderMessages(messages);
                }
            }
        } catch (e) {
            console.error('Erreur envoi message', e);
        } finally {
            btn.disabled = false;
            input.focus();
        }
    }

    // ── Utilitaires ───────────────────────────────────────

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── Init ──────────────────────────────────────────────

    loadCanaux();
</script>

</body>
</html>
