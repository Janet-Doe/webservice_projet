<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Journal de bord</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #f7f7f5;
            --surface:  #ffffff;
            --border:   #e2e2de;
            --text:     #1a1a18;
            --muted:    #888880;
            --accent:   #2d6a4f;
            --accent-h: #245a42;
            --error:    #c0392b;
            --radius:   6px;
            --mono:     'Courier New', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 360px;
        }

        .logo {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 28px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.15s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: var(--surface);
        }

        .error-msg {
            display: none;
            font-size: 12px;
            color: var(--error);
            margin-top: 14px;
            padding: 10px 12px;
            background: #fdf2f1;
            border: 1px solid #f5c6c2;
            border-radius: var(--radius);
        }

        .error-msg.visible { display: block; }

        button[type="submit"] {
            width: 100%;
            margin-top: 22px;
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        button[type="submit"]:hover { background: var(--accent-h); }
        button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">// journal de bord</div>
    <h1>Connexion</h1>
    <p class="subtitle">Entrez vos identifiants pour accéder aux canaux.</p>

    <div class="field">
        <label for="nom">Nom d'utilisateur</label>
        <input type="text" id="nom" autocomplete="username" placeholder="alice" />
    </div>

    <div class="field">
        <label for="mdp">Mot de passe</label>
        <input type="password" id="mdp" autocomplete="current-password" placeholder="••••••••" />
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button type="submit" id="btn-login">Se connecter</button>
</div>

<script>
    const API_BASE = '/webservice_projet-1.0-SNAPSHOT';

    const btnLogin  = document.getElementById('btn-login');
    const errorMsg  = document.getElementById('error-msg');
    const inputNom  = document.getElementById('nom');
    const inputMdp  = document.getElementById('mdp');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
    }

    function hideError() {
        errorMsg.classList.remove('visible');
    }

    async function login() {
        hideError();

        const nom = inputNom.value.trim();
        const mdp = inputMdp.value;

        if (!nom || !mdp) {
            showError('Veuillez remplir tous les champs.');
            return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = 'Connexion…';

        try {
            const res = await fetch(`${API_BASE}/users/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, mdp })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('utilisateur', data.utilisateur);
                window.location.href = 'index.html';
            } else {
                showError(data.erreur || 'Identifiants incorrects.');
            }
        } catch (e) {
            showError('Impossible de contacter le serveur.');
        } finally {
            btnLogin.disabled = false;
            btnLogin.textContent = 'Se connecter';
        }
    }

    btnLogin.addEventListener('click', login);

    [inputNom, inputMdp].forEach(el =>
        el.addEventListener('keydown', e => { if (e.key === 'Enter') login(); })
    );
</script>
</body>
</html>
